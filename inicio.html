<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>libgraph3 IDE - Inicio</title>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #252526;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        button {
            background: #007acc;
            border: none;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="margin-top:0;">📐 libgraph3 IDE</h1>
        <p>Crear o cargar un proyecto en C</p>
        <button id="nuevo">➕ Nuevo archivo .c</button>
        <button id="cargar">📂 Cargar archivo .c</button>
        <input type="file" id="fileInput" accept=".c" style="display:none;">
    </div>
    <script>
        document.getElementById('nuevo').addEventListener('click', () => {
            const codigoBase = `#include <libgraph3.h>\n\nint main() {\n    int gd = DETECT, gm;\n    initgraph(&gd, &gm, "");\n    setbkcolor(WHITE);\n    cleardevice();\n\n    // === INICIO COMPONENTES ===\n    // No hay componentes\n    // === FIN COMPONENTES ===\n\n    getch();\n    closegraph();\n    return 0;\n}\n`;
            localStorage.setItem('codigoC', codigoBase);
            window.location.href = 'index.html';
        });

        document.getElementById('cargar').addEventListener('click', () => { document.getElementById('fileInput').click(); });
        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                localStorage.setItem('codigoC', ev.target.result);
                window.location.href = 'index.html';
            };
            reader.readAsText(file);
        });
    </script>
</body>

</html>
