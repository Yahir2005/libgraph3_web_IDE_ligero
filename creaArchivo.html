<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>libgraph3 IDE - Inicio</title>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #252526;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        h1 {
            margin-top: 0;
        }

        button {
            background: #007acc;
            border: none;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📐 libgraph3 IDE</h1>
        <p>Crear o cargar un proyecto en C</p>
        <button id="nuevo">➕ Nuevo archivo .c</button>
        <button id="crearProyecto">📁 Crear proyecto C</button>
        <button id="cargar">📂 Cargar archivo .c</button>
        <input type="file" id="fileInput" accept=".c">
    </div>
    <script>
        document.getElementById('nuevo').addEventListener('click', () => {
            // Código base con marcador
            const codigoBase = `#include <libgraph3.h>\n\nint main() {\n    int gd = DETECT, gm;\n    initgraph(&gd, &gm, "");\n    setbkcolor(WHITE);\n    cleardevice();\n\n    //COMPONENTES\n\n    getch();\n    closegraph();\n    return 0;\n}\n`;
            localStorage.setItem('codigoC', codigoBase);
            window.location.href = 'editor.html';
        });

        document.getElementById('cargar').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                localStorage.setItem('codigoC', ev.target.result);
                window.location.href = 'editor.html';
            };
            reader.readAsText(file);
        });
    </script>
    <div id="modal-proyecto"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:999;">
        <div style="background:#252526; padding:30px; border-radius:8px; width:400px; color:white;">
            <h2>Nuevo proyecto C</h2>
            <label>Nombre del proyecto:</label>
            <input type="text" id="proj-name" style="width:100%; padding:8px; margin:8px 0;">
            <label><input type="checkbox" id="use-db"> Usar base de datos</label>
            <div id="db-options" style="margin:10px 0; display:none;">
                <label><input type="radio" name="db-type" value="mariadb"> MariaDB</label>
                <label><input type="radio" name="db-type" value="sqlite"> SQLite</label>
            </div>
            <button id="btn-generar-proyecto"
                style="background:#007acc; border:none; color:white; padding:10px 20px; border-radius:4px;">Generar y
                descargar</button>
            <button id="btn-cancelar-modal"
                style="background:#3c3c3c; border:none; color:white; padding:10px 20px; border-radius:4px;">Cancelar</button>
        </div>
    </div>
</body>

</html>
